<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>SWARM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: monospace;
      color: #fff;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #join-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #join-btn {
      padding: 30px 50px;
      font-size: 24px;
      font-family: monospace;
      font-weight: bold;
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      /* make sure the button is tappable */
      position: relative;
      z-index: 100;
    }

    #join-label {
      color: #00ff88;
      font-size: 14px;
      letter-spacing: 2px;
    }

    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 16px;
    }

    #role-label {
      font-size: 13px;
      letter-spacing: 3px;
      opacity: 0.6;
    }

    #role-name {
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #role-instruction {
      font-size: 16px;
      opacity: 0.7;
      letter-spacing: 1px;
    }

    #intensity-val {
      font-size: 13px;
      opacity: 0.4;
      margin-top: 8px;
    }

    #bar-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0%;
      transition: height 0.05s;
      opacity: 0.3;
    }

    #waiting-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #waiting-screen p {
      color: #00cc66;
      font-size: 16px;
      letter-spacing: 2px;
    }

    #waiting-screen small {
      color: #006633;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- join screen -->
  <div id="join-screen">
    <div id="join-label">SWARM</div>
    <button id="join-btn">ENTER THE SWARM</button>
  </div>

  <!-- waiting for role assignment -->
  <div id="waiting-screen">
    <p>YOU ARE IN</p>
    <small>STAND BY FOR YOUR ROLE</small>
  </div>

  <!-- game screen -->
  <div id="game-screen">
    <div id="bar-container"></div>
    <div id="role-label">YOUR ROLE</div>
    <div id="role-name">--</div>
    <div id="role-instruction">SHAKE IT</div>
    <div id="intensity-val">0</div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    // config
    const ROLE_NAMES = ["01 PULSE","02 RIFT","03 VOID","04 GLITCH","05 SURGE"];
    const ROLE_COLORS = [
      "#00ffb4",
      "#ff6400",
      "#5000ff",
      "#ff0050",
      "#ffdc00",
    ];
    const ROLE_INSTRUCTIONS = [
      "YOU ARE THE BEAT",
      "YOU ARE THE SOUND",
      "YOU ARE THE DARK",
      "YOU ARE THE BREAK",
      "YOU ARE THE SURGE",
    ];

    // state
    let myDeviceId = Math.floor(Math.random() * 1000000);
    let myRole = -1;
    let smoothedShake = 0;
    let isConnected = false;

    // ===== Socket =====
    const socket = io("/");

    socket.on('connect', () => {
      console.log('Socket connected:', socket.id);
    });

    socket.on('shake', (data) => {
      // receive role assignment from the host
      if (data.isHost && data.targetId === myDeviceId) {
        myRole = data.role;
        applyRole(myRole);
      }
    });

    // switch to game screen and apply role
    function applyRole(role) {
      document.getElementById('waiting-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex';

      let c = ROLE_COLORS[role] || '#ffffff';
      document.getElementById('role-name').innerText = ROLE_NAMES[role] || '--';
      document.getElementById('role-name').style.color = c;
      document.getElementById('role-instruction').innerText = ROLE_INSTRUCTIONS[role] || 'SHAKE';
      document.getElementById('role-instruction').style.color = c;
      document.getElementById('role-label').style.color = c;
      document.getElementById('bar-container').style.background = c;
      document.body.style.background = '#000';
    }

    // join button handler
    document.getElementById('join-btn').addEventListener('click', function() {
      // iOS 13+ requires explicit permission for motion sensors
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission()
          .then(state => {
            if (state === 'granted') startSensors();
            else alert('Please allow motion access to participate.');
          })
          .catch(err => {
            console.error(err);
            startSensors(); // continue even if permission fails
          });
      } else {
        // Android or desktop — no permission needed
        startSensors();
      }
    });

    function startSensors() {
      document.getElementById('join-screen').style.display = 'none';
      document.getElementById('waiting-screen').style.display = 'flex';
      isConnected = true;
      startSendLoop();
    }

    // read motion sensor data
    let accX = 0, accY = 0, accZ = 0;

    window.addEventListener('devicemotion', (e) => {
      if (e.accelerationIncludingGravity) {
        accX = e.accelerationIncludingGravity.x || 0;
        accY = e.accelerationIncludingGravity.y || 0;
        accZ = e.accelerationIncludingGravity.z || 0;
      }
    });

    // send loop — fires every 30ms (~33fps)
    function startSendLoop() {
      setInterval(() => {
        if (!isConnected) return;

        let rawShake = Math.abs(accX) + Math.abs(accY) + Math.abs(accZ);
        smoothedShake = smoothedShake * 0.75 + rawShake * 0.25;
        let val = Math.min(smoothedShake, 180);

        // send to the host computer
        socket.emit('shake', { id: myDeviceId, val: val });

        // update UI
        if (myRole >= 0) {
          let pct = (val / 180) * 100;
          document.getElementById('bar-container').style.height = pct + '%';
          document.getElementById('intensity-val').innerText = Math.round(val);

          // background darkens with intensity
          let bg = Math.round(val / 180 * 30);
          let c = ROLE_COLORS[myRole] || '#ffffff';
          // simple dark background when no role assigned yet
          document.body.style.background = `rgb(${bg},${bg},${bg})`;
        }
      }, 30);
    }
  </script>
</body>
</html>
